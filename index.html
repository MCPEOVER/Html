<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* 마인크래프트 베드락 폰트 느낌을 위한 설정 (기본 고딕 계열 사용) */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; /* 게임 UI처럼 텍스트 드래그 방지 */
        }

        /* 배경 (마인크래프트 흙 블록 느낌의 어두운 회색 또는 파노라마 대용) */
        body {
            background-color: #2b2b2b;
            background-image: radial-gradient(circle, #3a3a3a 0%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 베드락 폼(Form) UI 컨테이너 */
        .login-container {
            background-color: rgba(0, 0, 0, 0.75); /* 반투명한 검은색 배경 */
            padding: 30px;
            border: 2px solid #4a4a4a;
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000000; /* 글자 그림자 효과 */
        }

        /* 입력 폼 그룹 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d1d1;
            font-size: 14px;
            text-shadow: 1px 1px 0px #000;
        }

        /* 베드락 스타일 텍스트 입력창 */
        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e; /* 어두운 내부 */
            color: #ffffff;
            border: 2px solid #3c3c3c; /* 기본 테두리 */
            border-radius: 2px;
            font-size: 16px;
            transition: all 0.1s ease-in-out;
        }

        /* 입력창 포커스 (베드락 특유의 흰색 테두리 하이라이트) */
        .input-group input:focus {
            border-color: #ffffff;
            outline: none;
            background-color: #2a2a2a;
        }

        .input-group input::placeholder {
            color: #7a7a7a;
        }

        /* 베드락 스타일 버튼 (녹색 메인 버튼) */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #3c8527; /* 마인크래프트 UI 녹색 */
            color: white;
            border: 2px solid #1e1e1e;
            /* 입체감을 위한 테두리 색상 다르게 지정 */
            border-top-color: #5cbf3a;
            border-left-color: #5cbf3a;
            border-right-color: #235414;
            border-bottom-color: #235414;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #1e4a11;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 버튼 호버 & 클릭 효과 */
        .login-btn:hover {
            background-color: #43962c;
            border-top-color: #6ee645;
            border-left-color: #6ee645;
        }

        .login-btn:active {
            background-color: #2f691e;
            border-top-color: #1a3d10;
            border-left-color: #1a3d10;
            border-right-color: #4a9e32;
            border-bottom-color: #4a9e32;
            text-shadow: none;
        }

        /* 하단 링크 (일반 버튼 스타일로 변경) */
        .extra-links {
            margin-top: 15px;
            text-align: center;
        }

        .extra-links a {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background-color: #c6c6c6; /* 베드락 기본 회색 버튼 */
            color: #111111;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #585858;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-radius: 2px;
        }

        .extra-links a:hover {
            background-color: #d8d8d8;
        }

        .extra-links a:active {
            background-color: #9e9e9e;
            border-top-color: #585858;
            border-left-color: #585858;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>서버 접속</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">게이머태그 (아이디)</label>
                <input type="text" id="username" name="username" placeholder="아이디 입력" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">암호 (비밀번호)</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="login-btn">로그인</button>
            
            <div class="extra-links">
                <a href="#">새 계정 만들기</a>
            </div>
        </form>
    </div>

    <script>
        // 로그인 폼 제출 시 작동하는 자바스크립트
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 테스트용 로직 (아이디: admin, 비밀번호: 1234)
            if(username === 'admin' && password === '1234') {
                alert('서버에 접속했습니다! 환영합니다, ' + username + '님.');
            } else {
                alert('인증 실패: 게이머태그 또는 암호가 올바르지 않습니다.\n(테스트 계정: admin / 1234)');
            }
        });
    </script>
</body>
</html>
