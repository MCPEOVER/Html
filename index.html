<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>
    <style>
        /* 마인크래프트 베드락 폰트 느낌을 위한 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* 배경 (마인크래프트 흙 블록 느낌의 어두운 회색) */
        body {
            background-color: #2b2b2b;
            background-image: radial-gradient(circle, #3a3a3a 0%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 베드락 폼(Form) UI 컨테이너 */
        .login-container {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 30px;
            border: 2px solid #4a4a4a;
            border-radius: 4px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000000;
        }

        /* 입력 폼 그룹 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #d1d1d1;
            font-size: 14px;
            text-shadow: 1px 1px 0px #000;
        }

        /* 베드락 스타일 텍스트 입력창 */
        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e;
            color: #ffffff;
            border: 2px solid #3c3c3c;
            border-radius: 2px;
            font-size: 16px;
            transition: all 0.1s ease-in-out;
        }

        .input-group input:focus {
            border-color: #ffffff;
            outline: none;
            background-color: #2a2a2a;
        }

        .input-group input::placeholder {
            color: #7a7a7a;
        }

        /* 베드락 스타일 메인 버튼 (녹색) */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #3c8527;
            color: white;
            border: 2px solid #1e1e1e;
            border-top-color: #5cbf3a;
            border-left-color: #5cbf3a;
            border-right-color: #235414;
            border-bottom-color: #235414;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #1e4a11;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #43962c;
            border-top-color: #6ee645;
            border-left-color: #6ee645;
        }

        .submit-btn:active {
            background-color: #2f691e;
            border-top-color: #1a3d10;
            border-left-color: #1a3d10;
            border-right-color: #4a9e32;
            border-bottom-color: #4a9e32;
            text-shadow: none;
        }

        /* 하단 모드 전환 버튼 (회색) */
        .extra-links {
            margin-top: 15px;
            text-align: center;
        }

        .extra-links button {
            width: 100%;
            padding: 10px;
            background-color: #c6c6c6;
            color: #111111;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #585858;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-radius: 2px;
            cursor: pointer;
        }

        .extra-links button:hover {
            background-color: #d8d8d8;
        }

        .extra-links button:active {
            background-color: #9e9e9e;
            border-top-color: #585858;
            border-left-color: #585858;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2 id="formTitle">서버 접속</h2>
        <form id="authForm">
            <div class="input-group">
                <label for="username">(아이디)</label>
                <input type="text" id="username" name="username" placeholder="아이디 입력" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">암호 (비밀번호)</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">로그인</button>
            
            <div class="extra-links">
                <button type="button" id="toggleBtn">새 계정 만들기</button>
            </div>
        </form>
    </div>

    <script>
        // 현재 화면 상태 저장 (true: 로그인 모드, false: 회원가입 모드)
        let isLoginMode = true;

        const formTitle = document.getElementById('formTitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const authForm = document.getElementById('authForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // 초기에 테스트용 계정 하나를 로컬 스토리지에 만들어 둡니다.
        if (!localStorage.getItem('bedrock_users')) {
            const initialData = { 'admin': '1234' };
            localStorage.setItem('bedrock_users', JSON.stringify(initialData));
        }

        // 로그인 <-> 회원가입 화면 전환 이벤트
        toggleBtn.addEventListener('click', function() {
            isLoginMode = !isLoginMode; // 상태 반전
            
            // 입력창 초기화
            usernameInput.value = '';
            passwordInput.value = '';

            if (isLoginMode) {
                formTitle.innerText = '서버 접속';
                submitBtn.innerText = '로그인';
                toggleBtn.innerText = '새 계정 만들기';
            } else {
                formTitle.innerText = '새 계정 만들기';
                submitBtn.innerText = '회원가입';
                toggleBtn.innerText = '기존 계정으로 로그인';
            }
        });

        // 폼 제출(로그인 또는 회원가입) 이벤트
        authForm.addEventListener('submit', function(event) {
            event.preventDefault(); // 새로고침 방지

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                alert('게이머태그와 암호를 모두 입력해주세요.');
                return;
            }

            // 로컬 스토리지에서 유저 데이터 불러오기
            const users = JSON.parse(localStorage.getItem('bedrock_users'));

            if (isLoginMode) {
                // [로그인 로직]
                if (users[username] && users[username] === password) {
                    alert('서버에 접속했습니다! 환영합니다, ' + username + '님.');
                    // 로그인 성공 시 main.html로 이동
                    window.location.href = 'main.html';
                } else {
                    alert('인증 실패: 게이머태그 또는 암호가 올바르지 않습니다.');
                }
            } else {
                // [회원가입 로직]
                if (users[username]) {
                    alert('오류: 이미 존재하는 게이머태그입니다. 다른 이름을 사용해주세요.');
                } else {
                    // 새로운 유저 정보 저장
                    users[username] = password;
                    localStorage.setItem('bedrock_users', JSON.stringify(users));
                    alert('계정이 성공적으로 생성되었습니다! 이제 로그인해주세요.');
                    
                    // 회원가입 완료 후 로그인 화면으로 자동 전환
                    toggleBtn.click();
                }
            }
        });
    </script>
</body>
</html>
