<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 대시보드 - Bedrock UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        /* 공통 설정 및 변수 */
        :root {
            --text-color: #ffffff;
            --text-shadow: 2px 2px 0px #000000;
            --panel-bg: rgba(0, 0, 0, 0.75);
            --border-color: #4a4a4a;
            
            /* 녹색 버튼 (Primary) */
            --btn-green: #3c8527;
            --btn-green-hover: #43962c;
            --btn-green-active: #2f691e;
            
            /* 회색 버튼 (Secondary/Default) */
            --btn-gray: #c6c6c6;
            --btn-gray-hover: #d8d8d8;
            --btn-gray-active: #9e9e9e;
            
            /* 빨간색 버튼 (Danger) */
            --btn-red: #b52b2b;
            --btn-red-hover: #c93636;
            --btn-red-active: #8a1f1f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            user-select: none;
        }

        body {
            background-color: #2b2b2b;
            background-image: radial-gradient(circle, #3a3a3a 0%, #1a1a1a 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text-color);
        }

        /* 메인 컨테이너 레이아웃 */
        .main-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 헤더 (제목 및 로그아웃) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            text-shadow: var(--text-shadow);
        }

        /* 섹션 공통 스타일 */
        .section {
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid #3c3c3c;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 2px;
        }

        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #d1d1d1;
            text-shadow: 1px 1px 0px #000;
        }

        /* === 공통 버튼 스타일 (Bedrock 3D 효과) === */
        .btn {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid;
            border-radius: 2px;
            cursor: pointer;
            text-align: center;
            display: inline-block;
        }

        /* 회색 버튼 */
        .btn-gray {
            background-color: var(--btn-gray);
            color: #111;
            border-color: #585858;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
        }
        .btn-gray:hover { background-color: var(--btn-gray-hover); }
        .btn-gray:active {
            background-color: var(--btn-gray-active);
            border-top-color: #585858;
            border-left-color: #585858;
            border-right-color: #ffffff;
            border-bottom-color: #ffffff;
        }

        /* 녹색 버튼 */
        .btn-green {
            background-color: var(--btn-green);
            color: white;
            text-shadow: 1px 1px 0px #1e4a11;
            border-color: #235414;
            border-top-color: #5cbf3a;
            border-left-color: #5cbf3a;
        }
        .btn-green:hover { background-color: var(--btn-green-hover); }
        .btn-green:active {
            background-color: var(--btn-green-active);
            border-top-color: #1a3d10;
            border-left-color: #1a3d10;
            border-right-color: #4a9e32;
            border-bottom-color: #4a9e32;
            text-shadow: none;
        }

        /* 빨간색 버튼 */
        .btn-red {
            background-color: var(--btn-red);
            color: white;
            text-shadow: 1px 1px 0px #4a1111;
            border-color: #5e1515;
            border-top-color: #e85a5a;
            border-left-color: #e85a5a;
        }
        .btn-red:hover { background-color: var(--btn-red-hover); }
        .btn-red:active {
            background-color: var(--btn-red-active);
            border-top-color: #3d0d0d;
            border-left-color: #3d0d0d;
            border-right-color: #d14747;
            border-bottom-color: #d14747;
            text-shadow: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* === 슬라이더 (Carousel) UI === */
        .carousel-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .carousel-view {
            flex-grow: 1;
            overflow: hidden;
            border: 2px solid #3c3c3c;
            background-color: #1e1e1e;
            position: relative;
            height: 150px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.3s ease-in-out;
            height: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            text-shadow: var(--text-shadow);
            border-right: 2px solid #3c3c3c;
        }

        /* 슬라이드 가짜 배경색 부여 */
        .slide-1 { background-color: #2c5470; }
        .slide-2 { background-color: #6a4b33; }
        .slide-3 { background-color: #426338; }

        .btn-nav {
            padding: 15px 10px;
        }

        /* === 폼 컨트롤 UI (토글, 레인지 슬라이더, 프로그레스 바) === */
        .ui-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            color: #d1d1d1;
            font-size: 14px;
            text-shadow: 1px 1px 0px #000;
        }

        /* 베드락 스타일 토글 스위치 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1e1e1e;
            border: 2px solid #3c3c3c;
            transition: .2s;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: var(--btn-gray);
            border: 2px solid #585858;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            transition: .2s;
        }

        input:checked + .toggle-slider {
            background-color: var(--btn-green);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(30px);
        }

        /* 베드락 스타일 레인지 슬라이더 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: #1e1e1e;
            border: 2px solid #3c3c3c;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 16px;
            background: var(--btn-gray);
            border: 2px solid #585858;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px; /* 트랙 중앙 정렬 */
        }

        /* 베드락 스타일 프로그레스 바 */
        .progress-container {
            width: 100%;
            height: 24px;
            background-color: #1e1e1e;
            border: 2px solid #3c3c3c;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--btn-green);
            width: 45%; /* 기본값 */
            border-top: 2px solid #5cbf3a;
            border-right: 2px solid #235414;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header class="header">
            <h1 id="welcomeText">대시보드</h1>
            <button class="btn btn-gray" onclick="logout()">로그아웃</button>
        </header>

        <div class="section">
            <h2>주요 소식 (슬라이더)</h2>
            <div class="carousel-container">
                <button class="btn btn-gray btn-nav" onclick="moveSlide(-1)">◀</button>
                <div class="carousel-view">
                    <div class="carousel-track" id="carouselTrack">
                        <div class="carousel-slide slide-1">새로운 업데이트 안내</div>
                        <div class="carousel-slide slide-2">시스템 점검 일정</div>
                        <div class="carousel-slide slide-3">이벤트 진행 중</div>
                    </div>
                </div>
                <button class="btn btn-gray btn-nav" onclick="moveSlide(1)">▶</button>
            </div>
        </div>

        <div class="section">
            <h2>버튼 구성 요소</h2>
            <div class="btn-group">
                <button class="btn btn-green">저장하기 (Primary)</button>
                <button class="btn btn-gray">취소 (Secondary)</button>
                <button class="btn btn-red">삭제 (Danger)</button>
                <button class="btn btn-gray" disabled style="opacity: 0.5; cursor: not-allowed;">비활성화 됨</button>
            </div>
        </div>

        <div class="section">
            <h2>설정 컨트롤</h2>
            <div class="ui-controls">
                
                <div class="control-group">
                    <label>알림 수신 (토글)</label>
                    <label class="toggle-switch">
                        <input type="checkbox" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="control-group">
                    <label>음량 조절 (<span id="rangeValue">50</span>%)</label>
                    <input type="range" min="0" max="100" value="50" oninput="updateRange(this.value)">
                </div>

                <div class="control-group" style="grid-column: span 2;">
                    <label>데이터 처리 진행률</label>
                    <div class="progress-container">
                        <div class="progress-bar" id="myProgressBar"></div>
                    </div>
                    <button class="btn btn-gray" style="margin-top: 10px; width: fit-content;" onclick="simulateProgress()">진행 테스트</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- 1. 로그인 정보 표시 및 로그아웃 처리 ---
        // (index.html에서 넘어왔다고 가정하고 간단한 환영 문구를 띄울 수 있습니다)
        function logout() {
            if(confirm('로그아웃 하시겠습니까?')) {
                window.location.href = 'index.html'; // 이전 로그인 페이지 파일명에 맞게 수정하세요.
            }
        }

        // --- 2. 콘텐츠 슬라이더 로직 ---
        let currentSlide = 0;
        const track = document.getElementById('carouselTrack');
        const totalSlides = document.querySelectorAll('.carousel-slide').length;

        function moveSlide(direction) {
            currentSlide += direction;
            
            // 처음과 끝 순환 처리
            if (currentSlide < 0) {
                currentSlide = totalSlides - 1;
            } else if (currentSlide >= totalSlides) {
                currentSlide = 0;
            }
            
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // --- 3. 레인지 슬라이더 텍스트 업데이트 ---
        function updateRange(val) {
            document.getElementById('rangeValue').innerText = val;
        }

        // --- 4. 프로그레스 바 시뮬레이션 ---
        function simulateProgress() {
            const bar = document.getElementById('myProgressBar');
            let width = 0;
            bar.style.width = '0%';
            
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                } else {
                    width += 5; // 5%씩 증가
                    bar.style.width = width + '%';
                }
            }, 50); // 0.05초마다 업데이트
        }
    </script>
</body>
</html>
